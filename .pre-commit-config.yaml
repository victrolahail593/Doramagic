# Pre-commit hooks — run automatically on git commit
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy-contracts
        name: mypy (contracts)
        entry: .venv/bin/python -m mypy packages/contracts/doramagic_contracts/
        language: system
        pass_filenames: false
        types: [python]
