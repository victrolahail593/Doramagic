name: python-dotenv
repo_url: https://github.com/theskumar/python-dotenv
description: "Read key-value pairs from a .env file and set them as environment variables"
primary_language: Python
version: 1.2.2
stars: ~3500
license: BSD-3-Clause
author: Saurabh Kumar
python_requires: ">=3.10"

purpose: >
  Load environment variables from .env files into os.environ, enabling
  12-factor app configuration. Supports variable interpolation, multiple
  quoting styles, multiline values, CLI manipulation, and IPython integration.

source_metrics:
  package_dir: src/dotenv/
  total_lines: 1105
  file_count: 8  # 7 .py + 1 py.typed marker
  files:
    - path: src/dotenv/__init__.py
      lines: 51
      role: Public API re-exports and __all__
    - path: src/dotenv/__main__.py
      lines: 6
      role: Entry point for `python -m dotenv`
    - path: src/dotenv/cli.py
      lines: 247
      role: Click-based CLI (list, get, set, unset, run)
    - path: src/dotenv/ipython.py
      lines: 50
      role: IPython %dotenv magic
    - path: src/dotenv/main.py
      lines: 482
      role: Core engine (DotEnv class, load/set/unset/find)
    - path: src/dotenv/parser.py
      lines: 182
      role: Streaming .env parser (Reader, Binding, parse_stream)
    - path: src/dotenv/variables.py
      lines: 86
      role: POSIX variable interpolation (Atom/Literal/Variable)
    - path: src/dotenv/version.py
      lines: 1
      role: Version string

dependencies:
  runtime:
    - name: click
      version: ">=5.0"
      optional: true
      extra: cli
      purpose: CLI interface
  dev:
    - pytest
    - pytest-cov
    - tox
    - ruff
    - mypy
    - ipython

build_system:
  backend: setuptools
  requires: "setuptools >= 77.0"

ci:
  platform: GitHub Actions
  test_matrix:
    os: [ubuntu-latest, windows-latest]
    python: ["3.10", "3.11", "3.12", "3.13", "3.14", "3.14t", "pypy3.11"]
  tools: [tox, tox-gh-actions]

entry_points:
  cli: "dotenv = dotenv.__main__:cli"
  python_api: "from dotenv import load_dotenv, dotenv_values"
  ipython_magic: "%load_ext dotenv"
